syntax = "proto3";

package kvstore.v1;

option cc_enable_arenas = true;

// v1 API is intentionally minimal and unary-only.
service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message PutRequest {
  bytes key = 1;        // max 1 KiB (enforced by service layer)
  bytes value = 2;      // max 1 MiB (enforced by service layer)
  string request_id = 3;
}

message PutResponse {
  bool overwritten = 1;
}

message GetRequest {
  bytes key = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
}

message DeleteRequest {
  bytes key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}
